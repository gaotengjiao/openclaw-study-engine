<!DOCTYPE html>
<html>
<head>
    <title>StudyEngine Chat</title>
    <style>
        body { font-family: sans-serif; display: flex; height: 100vh; margin: 0; background: #f0f2f5; }
        #chat-container { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #ddd; height: 100%; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        .msg { margin-bottom: 15px; padding: 10px; border-radius: 8px; max-width: 80%; word-wrap: break-word; }
        .user { background: #007bff; color: white; align-self: flex-end; }
        .ai { background: white; border: 1px solid #ddd; align-self: flex-start; white-space: pre-wrap; }
        #input-area { padding: 20px; background: white; display: flex; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px; outline: none; }
        button { margin-left: 10px; padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #218838; }
    </style>
</head>
<body>
    <div id="chat-container">
        <div id="messages">
            <div class="msg ai">你好 Adam！准备好开始今天的费曼学习法了吗？</div>
        </div>
        <div id="input-area">
            <input type="text" id="userInput" placeholder="输入对 Transformer 的理解...">
            <button id="sendBtn">发送</button>
        </div>
    </div>

    <script src="/static/chat.js"></script>
</body>
</html>
